<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Your Page Title</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Page title at the top */
        .page-title {
            text-align: center;
            font-size: 2.5em;
            font-weight: bold;
            color: #222;
            padding: 20px 0;
            margin: 0;
            background-color: #f9f9f9;
        }

        /* Background shapes */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            z-index: -1;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            top: 200px;
            left: -150px;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            bottom: -100px;
            right: -100px;
        }

        .shape-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            top: 50%;
            left: 10%;
        }

        /* Main content container */
        .container {
            text-align: center;
            max-width: 800px;
            padding: 40px 20px;
            margin: -1px auto 0;
            position: relative;
            z-index: 1;
        }

        .subtitle-above {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
        }

        .main-text {
            font-size: 3em;
            font-weight: bold;
            color: #222;
            margin: 0;
            line-height: 1.2;
        }

        .subtitle-below {
            font-size: 1.2em;
            color: #666;
            margin-top: 20px;
        }

        /* Style for the info icon */
        .info-icon {
            display: inline-block;
            margin-left: 10px;
            /* Make the info icon appear upper */
            vertical-align: 7%;
            position: relative;
            cursor: pointer;
            font-style: normal;
            color: #1b84e6;
            font-size: 0.8em;
            border: 1px solid #103e69;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            text-align: center;
            line-height: 30px;
            background-color: #f9f9f9;
        }

        /* Style for the tooltip */
        .info-icon .tooltip {
            visibility: hidden;
            width: 400px;
            background-color: #cce1ec;
            color: #2071db;
            border: 1px solid #1b84e6;
            text-align: justify;
            border-radius: 10px;
            padding: 12px;
            position: absolute;
            z-index: 2;
            top: 125%; /* Position below the icon */
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .info-icon .tooltip:after {
            content: "";
            position: absolute;
            top: -10px;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: transparent transparent #555 transparent;
        }

        /* Show the tooltip on hover */
        .info-icon:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .bottom-info-icon {
            display: inline-block;
            position: fixed;
            cursor: pointer;
            font-style: normal;
            font-size: 80px;
            color: #2071db;
            /* border: 1px solid #103e69;
            border-radius: 50%; */
            width: 30px;
            height: 30px;
            text-align: center;
            line-height: 30px;
            background-color: #f9f9f9;
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 1.2em;
            z-index: 100;
        }

        .bottom-info-icon .bottom-tooltip {
            visibility: hidden;
            width: 400px;
            background-color: #cce1ec;
            color: #2071db;
            border: 1px solid #1b84e6;
            text-align: justify;
            border-radius: 10px;
            padding: 12px;
            position: absolute;
            z-index: 2;
            bottom: 125%; /* Position below the icon */
            left: 50%;
            transform: translateX(-100%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .bottom-info-icon:hover .bottom-tooltip {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1 class="page-title">
        La Cagnotte de Théo
        <span class="info-icon">
            <i class="fas fa-info-circle"></i>
            <span class="tooltip">
                Théo veut s'acheter une PS5 mais il est trop pauvre (Gngngn un ingénieur ça gagne bien sa vie gngngn).
                <br>
                Voici donc le compteur de la cagnotte !
            </span>
        </span>
    </h1>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="container">
        <p class="subtitle-above">Objectif: 500€</p>
        <h1 class="main-text">0€</h1>
        <p class="subtitle-below">0 donateur.ice</p>
    </div>

    <div class="bottom-info-icon">
        <i class="fas fa-info-circle"></i>
        <span class="bottom-tooltip">
            Ceci n'est qu'un compteur. Pour donner, veuillez contacter directement Théo.
        </span>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Page Title</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: relative;
        }

        /* Background shapes */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            z-index: -1;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            top: -150px;
            left: -150px;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            bottom: -100px;
            right: -100px;
        }

        .shape-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            top: 50%;
            left: 10%;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
            z-index: 1;
        }

        .subtitle-above {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
        }

        .main-text {
            font-size: 3em;
            font-weight: bold;
            color: #222;
            margin: 0;
            line-height: 1.2;
        }

        .subtitle-below {
            font-size: 1.2em;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
    
    <div class="container">
        <p class="subtitle-above">Objectif: 500€</p>
        <h1 class="main-text">0€</h1>
        <p class="subtitle-below">0 donateur.ice</p>
    </div>
</body>
</html>

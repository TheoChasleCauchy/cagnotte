<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Cagnotte de Théo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        .page-title {
            text-align: center;
            font-size: 2.5em;
            font-weight: bold;
            color: #222;
            padding: 30px 0;
            margin: 0;
            background-color: #f9f9f9;
            border-bottom: 1px solid #eee;
        }

        .info-icon {
            display: inline-block;
            margin-left: 10px;
            position: relative;
            cursor: pointer;
            color: #666;
        }

        .info-icon .tooltip {
            visibility: hidden;
            width: 400px;
            background-color: #7c9fd8;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px;
            position: absolute;
            z-index: 2;
            top: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .info-icon:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .bg-shape {
            position: absolute;
            border-radius: 50%;
            z-index: -1;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            top: 100px;
            left: -150px;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            bottom: 28px;
            right: -10px;
        }

        .shape-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            top: 50%;
            left: 10%;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 40px 20px;
            margin: 20px auto 0;
            position: relative;
            z-index: 1;
        }

        .subtitle-above {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
        }

        .main-text {
            font-size: 3em;
            font-weight: bold;
            color: #222;
            margin: 0;
            line-height: 1.2;
        }

        .subtitle-below {
            font-size: 1.2em;
            color: #666;
            margin-top: 20px;
        }

        .bottom-info-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            cursor: pointer;
            color: #666;
            font-size: 3.2em;
            z-index: 100;
        }

        .bottom-info-icon .bottom-tooltip {
            visibility: hidden;
            width: 400px;
            background-color: #7c9fd8;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px;
            position: absolute;
            font-size: 80%;
            z-index: 101;
            bottom: 125%;
            left: 50%;
            transform: translateX(-100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .bottom-info-icon:hover .bottom-tooltip {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1 class="page-title">
        La Cagnotte de Théo
        <span class="info-icon">
            <i class="fas fa-info-circle"></i>
            <span class="tooltip">
                Théo veut s'acheter une PS5 mais il est trop pauvre (Gngngn un ingénieur ça gagne bien sa vie gngngn).
                <br>
                Voici donc le compteur de la cagnotte !
            </span>
        </span>
    </h1>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="container">
        <p class="subtitle-above">Objectif: 550€</p>
        <h1 class="main-text">400€</h1>
        <p class="subtitle-below">3 donateur.ices</p>
    </div>

    <div class="bottom-info-icon">
        <i class="fas fa-info-circle"></i>
        <span class="bottom-tooltip">Ceci n'est qu'un compteur. Pour donner, veuillez contacter directement Théo.</span> 
    </div>
    <button id="playSound" style="display: none;">Play Sound</button>

    <!-- Scripts -->
    <audio id="hoverSound" src="https://raw.githubusercontent.com/TheoChasleCauchy/cagnotte/main/audios/COMBIEN.wav" preload="auto"></audio>
    <script>
        const mainText = document.querySelector('.main-text');
        const hoverSound = document.getElementById('hoverSound');

        mainText.addEventListener('mouseenter', () => {
            playButton.click(); // Simulate user interaction
            hoverSound.currentTime = 0;
            hoverSound.play().catch(e => console.log("Audio play failed:", e));
        });
    </script>
</body>
</html>
